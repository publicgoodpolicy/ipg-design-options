document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x\">\n        <span style=\"font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:11.5px;color:#C9A14F\">Cited by<\u002Fspan>\n        <span style=\"opacity:.85\">Chicago City Council<\u002Fspan><span style=\"opacity:.4\">·<\u002Fspan>\n        <span style=\"opacity:.85\">Crain's Chicago Business<\u002Fspan><span style=\"opacity:.4\">·<\u002Fspan>\n        <span style=\"opacity:.85\">WBEZ<\u002Fspan><span style=\"opacity:.4\">·<\u002Fspan>\n        <span style=\"opacity:.85\">SEIU Local 73<\u002Fspan><span style=\"opacity:.4\">·<\u002Fspan>\n        <span style=\"opacity:.85\">Illinois Economic Policy Institute<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FEATURED REPORT -->\n    <section style=\"max-width:1120px;margin:0 auto;padding:64px 28px\">\n      <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:48px;align-items:center;border:1px solid #E3DECF;border-radius:5px;overflow:hidden;background:#fff\">\n        <div style=\"position:relative;align-self:stretch;min-height:340px;background:linear-gradient(150deg,#9E2B25,#7C231F)\">\n          <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.35))\"><\u002Fdiv>\n          <span style=\"position:absolute;top:18px;left:18px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.25);padding:6px 11px;border-radius:3px\">Featured report<\u002Fspan>\n          <span style=\"position:absolute;left:18px;bottom:16px;color:rgba(255,255,255,.85);font-size:12px;font-style:italic;font-family:'Spectral',serif\">Photo: a city skyline / data visualization cover<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:14px 38px 14px 0\">\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9E2B25;margin:0 0 12px\">Taxation · March 2026<\u002Fp>\n          <h2 style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:30px;line-height:1.08;letter-spacing:-.015em;color:#16243F;margin:0 0 14px\">The Chicago SMART Tax: Recouping Big Tech Tax Avoidance<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.62;color:#3C465C;margin:0 0 22px\">A first-of-its-kind levy that asks the platforms profiting from Chicagoans to pay $0.50 per user per month — funding mental-health centers and non-police crisis response.<\u002Fp>\n          <a href=\"#\" onclick=\"{{ showReport }}\" style=\"font-size:14.5px;font-weight:700;color:#16243F;text-decoration:none;border-bottom:2px solid #B0883C;padding-bottom:2px\">Read the full report →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RESEARCH GRID -->\n    <section style=\"max-width:1120px;margin:0 auto;padding:8px 28px 56px\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2px solid #16243F;padding-bottom:12px;margin-bottom:30px\">\n        <h2 style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.01em;color:#16243F;margin:0\">Latest research<\u002Fh2>\n        <a href=\"#\" style=\"font-size:13.5px;font-weight:700;color:#9E2B25;text-decoration:none\">All reports →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px\">\n        <sc-for list=\"{{ research }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <a href=\"#\" style=\"text-decoration:none;color:inherit;display:flex;flex-direction:column;border:1px solid #E3DECF;border-radius:5px;overflow:hidden;background:#fff\">\n            <div style=\"height:150px;background:{{ item.bg }};position:relative\">\n              <span style=\"position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.22);padding:5px 9px;border-radius:3px\">{{ item.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:20px 20px 24px;display:flex;flex-direction:column;flex:1\">\n              <h3 style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:18px;line-height:1.2;color:#16243F;margin:0 0 10px\">{{ item.title }}<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.55;color:#5C667A;margin:0 0 16px\">{{ item.desc }}<\u002Fp>\n              <span style=\"margin-top:auto;font-size:12px;font-weight:600;letter-spacing:.04em;color:#8A93A6\">{{ item.date }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- IN THE PRESS -->\n    <section style=\"background:#F4F0E5;border-top:1px solid #E3DECF;border-bottom:1px solid #E3DECF\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:48px 28px\">\n        <p style=\"font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#9E2B25;margin:0 0 22px\">In the press<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n          <sc-for list=\"{{ press }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <blockquote style=\"margin:0;border-left:3px solid #B0883C;padding:4px 0 4px 18px\">\n              <p style=\"font-family:'Spectral',serif;font-style:italic;font-size:17px;line-height:1.5;color:#1B2333;margin:0 0 12px\">“{{ p.quote }}”<\u002Fp>\n              <cite style=\"font-style:normal;font-size:12.5px;font-weight:700;letter-spacing:.04em;color:#5C667A\">{{ p.source }}<\u002Fcite>\n            <\u002Fblockquote>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SOCIAL STRIP -->\n    <section style=\"max-width:1120px;margin:0 auto;padding:56px 28px\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px\">\n        <div>\n          <h2 style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:24px;color:#16243F;margin:0 0 4px\">From the field<\u002Fh2>\n          <p style=\"font-size:14px;color:#5C667A;margin:0\">Explainers and clips from <strong style=\"color:#16243F\">@publicgoodpolicy<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <a href=\"#\" style=\"font-size:13.5px;font-weight:700;color:#9E2B25;text-decoration:none\">Follow on Instagram →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n        <sc-for list=\"{{ social }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"position:relative;aspect-ratio:4/5;border-radius:5px;overflow:hidden;background:{{ s.bg }}\">\n            <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.6))\"><\u002Fdiv>\n            <div style=\"position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:999px;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center\">\n              <span style=\"border-left:9px solid #16243F;border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px\"><\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"position:absolute;left:14px;right:14px;bottom:14px;color:#fff;font-size:13.5px;font-weight:600;line-height:1.3;margin:0\">{{ s.cap }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER CTA -->\n    <section style=\"background:#16243F;color:#fff\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:58px 28px;display:grid;grid-template-columns:1.2fr .8fr;gap:40px;align-items:center\">\n        <div>\n          <h2 style=\"font-family:'Libre Franklin',sans-serif;font-weight:900;font-size:30px;line-height:1.1;margin:0 0 12px\">Get the evidence before the vote.<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.6;color:rgba(255,255,255,.78);margin:0;max-width:34em\">A short monthly brief for legislators, organizers, and reporters — the findings that matter, in plain language.<\u002Fp>\n        <\u002Fdiv>\n        <form style=\"display:flex;gap:10px\" onsubmit=\"{{ noop }}\">\n          <input type=\"email\" placeholder=\"you@email.org\" style=\"flex:1;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:#fff;border-radius:3px;padding:13px 14px;font-size:14px;font-family:inherit\">\n          <button style=\"font-size:14px;font-weight:700;color:#16243F;background:#C9A14F;border:none;border-radius:3px;padding:13px 20px;cursor:pointer\">Subscribe<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ REPORT ============ -->\n  <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n    <div style=\"max-width:760px;margin:0 auto;padding:14px 28px 0\">\n      <a href=\"#\" onclick=\"{{ showHome }}\" style=\"font-size:13px;font-weight:600;color:#5C667A;text-decoration:none\">← Research<\u002Fa>\n    <\u002Fdiv>\n    <!-- ARTICLE HEADER -->\n    <article>\n      <header style=\"max-width:760px;margin:0 auto;padding:30px 28px 38px;border-bottom:1px solid #E3DECF\">\n        <p style=\"font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#9E2B25;margin:0 0 18px\">Taxation · Report<\u002Fp>\n        <h1 style=\"font-family:'Libre Franklin',sans-serif;font-weight:900;font-size:clamp(34px,4.6vw,52px);line-height:1.04;letter-spacing:-.02em;color:#16243F;margin:0 0 20px\">The Chicago SMART Tax<\u002Fh1>\n        <p style=\"font-family:'Spectral',serif;font-style:italic;font-size:21px;line-height:1.5;color:#3C465C;margin:0 0 26px\">Pathways to recouping Big Tech tax avoidance — a $0.50 per-user levy that funds mental-health care and non-police crisis response.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:13.5px;color:#5C667A\">\n          <span style=\"font-weight:700;color:#16243F\">Institute for the Public Good<\u002Fspan>\n          <span style=\"opacity:.5\">·<\u002Fspan><span>March 24, 2026<\u002Fspan>\n          <span style=\"opacity:.5\">·<\u002Fspan><span>14 min read<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- STAT BAND -->\n      <section style=\"background:#16243F;color:#fff\">\n        <div style=\"max-width:980px;margin:0 auto;padding:40px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.12)\">\n          <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div style=\"background:#16243F;padding:8px 18px\">\n              <div data-count=\"{{ st.val }}\" data-prefix=\"{{ st.prefix }}\" data-suffix=\"{{ st.suffix }}\" data-dec=\"{{ st.dec }}\" style=\"font-family:'Libre Franklin',sans-serif;font-weight:900;font-size:34px;line-height:1;letter-spacing:-.02em;color:{{ st.color }}\">{{ st.num }}<\u002Fdiv>\n              <div style=\"font-size:13px;line-height:1.4;color:rgba(255,255,255,.72);margin-top:8px\">{{ st.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- BODY -->\n      <div style=\"max-width:680px;margin:0 auto;padding:52px 28px 20px;font-size:18px;line-height:1.72;color:#252C3C\">\n        <p style=\"margin:0 0 22px\"><span style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:54px;line-height:.8;float:left;color:#9E2B25;margin:6px 14px -4px 0\">F<\u002Fspan>or the better part of two decades, the “Silicon Six” — Alphabet, Amazon, Apple, Meta, Microsoft, and Netflix — have reshaped the domestic and global economy while paying a fraction of the tax rate borne by ordinary households and small businesses.<\u002Fp>\n        <p style=\"margin:0 0 22px\">Chicago’s Social Media Amusement and Responsibility Tax answers that imbalance with a simple proposition: the platforms that profit from the attention of Chicagoans should help pay for the public systems that attention strains.<\u002Fp>\n\n        <h2 data-reveal=\"\" style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:27px;letter-spacing:-.01em;color:#16243F;margin:42px 0 14px\">The mechanics of the tax<\u002Fh2>\n        <p style=\"margin:0 0 22px\">The levy is calculated monthly: a platform owes $0.50 for every active Chicago consumer it serves. For the largest platforms, that figure scales into the tens of millions — revenue earmarked, by ordinance, for community mental-health centers and a non-police crisis-response corps.<\u002Fp>\n\n        <blockquote data-reveal=\"\" style=\"margin:38px 0;padding:6px 0 6px 26px;border-left:4px solid #B0883C\">\n          <p style=\"font-family:'Spectral',serif;font-style:italic;font-size:25px;line-height:1.45;color:#16243F;margin:0\">“We are not asking platforms to do anything except pay what every corner store on the block already pays — their fair share.”<\u002Fp>\n        <\u002Fblockquote>\n\n        <p style=\"margin:0 0 22px\">Opponents argue the cost will be passed to consumers. The report’s modeling shows otherwise: at $0.50 per user, the liability is a rounding error against platform margins, and the ordinance bars fee pass-through on Chicago accounts.<\u002Fp>\n\n        <h2 data-reveal=\"\" style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:27px;letter-spacing:-.01em;color:#16243F;margin:42px 0 14px\">A new social contract<\u002Fh2>\n        <p style=\"margin:0 0 22px\">The SMART tax is a marker in a long evolution of digital taxation policy — and a template other municipalities are already studying. It reframes the social-media experience as a taxable amusement, and routes the proceeds straight back into the public good.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- SOURCES -->\n      <div style=\"max-width:680px;margin:0 auto;padding:24px 28px 70px\">\n        <div data-reveal=\"\" style=\"border-top:1px solid #E3DECF;padding-top:20px\">\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9E2B25;margin:0 0 12px\">Sources<\u002Fp>\n          <ol style=\"margin:0;padding-left:20px;font-size:14px;line-height:1.7;color:#5C667A\">\n            <li>Fair Tax Foundation, <em>Silicon Six Report 2025<\u002Fem>.<\u002Fli>\n            <li>City of Chicago, <em>SMART Tax Ordinance<\u002Fem>, 2026.<\u002Fli>\n            <li>Illinois Economic Policy Institute, fiscal modeling, 2026.<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- SITE FOOTER -->\n  <footer style=\"background:#0F1A30;color:rgba(255,255,255,.7)\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:46px 28px;display:flex;gap:40px;flex-wrap:wrap;align-items:center\">\n      <div style=\"display:flex;align-items:center;gap:12px;color:#fff\">\n        <svg viewBox=\"0 0 100 100\" width=\"34\" height=\"34\" fill=\"currentColor\" aria-hidden=\"true\"><g stroke=\"currentColor\" stroke-width=\"3.4\" stroke-linecap=\"round\"><line x1=\"50\" y1=\"50\" x2=\"50\" y2=\"15\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"78\" y2=\"27\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"85\" y2=\"57\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"69\" y2=\"83\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"29\" y2=\"85\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"15\" y2=\"58\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"22\" y2=\"26\"><\u002Fline><\u002Fg><circle cx=\"50\" cy=\"50\" r=\"6\"><\u002Fcircle><circle cx=\"50\" cy=\"12\" r=\"5\"><\u002Fcircle><circle cx=\"80\" cy=\"24\" r=\"4\"><\u002Fcircle><circle cx=\"87\" cy=\"57\" r=\"6.5\"><\u002Fcircle><circle cx=\"69\" cy=\"85\" r=\"5.5\"><\u002Fcircle><circle cx=\"27\" cy=\"87\" r=\"4\"><\u002Fcircle><circle cx=\"12\" cy=\"58\" r=\"6\"><\u002Fcircle><\u002Fsvg>\n        <span style=\"font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:14px;line-height:1.1\">Institute for the<br>Public Good<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0;font-size:13px;max-width:30em;line-height:1.6\">Independent, nonpartisan research for an economy that serves working people. Chicago, Illinois.<\u002Fp>\n      <div style=\"margin-left:auto;display:flex;gap:22px;font-size:13px;font-weight:600\">\n        <a href=\"#\" style=\"color:rgba(255,255,255,.7);text-decoration:none\">Research<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(255,255,255,.7);text-decoration:none\">Newsroom<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(255,255,255,.7);text-decoration:none\">Donate<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(255,255,255,.7);text-decoration:none\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'home' };\n  componentDidMount(){ this.fxAccent='#9E2B25'; try{ if(location.hash==='#report'){ this.setState({view:'report'}); setTimeout(()=>this.initFx(),90); } }catch(e){} }\n  componentDidUpdate(pp,ps){ if(this.state.view==='report' && ps.view!=='report') this.initFx(); }\n  initFx(){\n    var accent=this.fxAccent||'#111';\n    var prm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    var bar=document.getElementById('__sfxbar');\n    if(!bar){bar=document.createElement('div');bar.id='__sfxbar';bar.style.cssText='position:fixed;top:0;left:0;height:3px;width:0;z-index:300;transition:width .12s linear';document.body.appendChild(bar);}\n    bar.style.background=accent;\n    if(!this._sfxScroll){this._sfxScroll=function(){var h=document.documentElement.scrollHeight-window.innerHeight;bar.style.width=(h>0?Math.min(1,window.scrollY/h)*100:0)+'%';};window.addEventListener('scroll',this._sfxScroll,{passive:true});}\n    this._sfxScroll();\n    var self=this;\n    setTimeout(function(){\n      var els=[].slice.call(document.querySelectorAll('[data-reveal]'));\n      els.forEach(function(el){if(el.__sfx)return;el.__sfx=1;if(prm)return;el.style.opacity='0';el.style.transform='translateY(24px)';el.style.transition='opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)';var d=parseFloat(el.getAttribute('data-reveal'));if(!isNaN(d))el.style.transitionDelay=d+'ms';});\n      if(!prm){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='none';io.unobserve(e.target);}});},{threshold:.15,rootMargin:'0px 0px -7% 0px'});els.forEach(function(el){io.observe(el);});}\n      var nums=[].slice.call(document.querySelectorAll('[data-count]'));\n      var cio=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){self.countUp(e.target);cio.unobserve(e.target);}});},{threshold:.6});\n      nums.forEach(function(n){if(!n.__cnt){n.__cnt=1;cio.observe(n);}});\n    },60);\n  }\n  countUp(el){\n    var t=parseFloat(el.getAttribute('data-count'));if(isNaN(t)){return;}\n    var dec=parseInt(el.getAttribute('data-dec')||'0',10),pre=el.getAttribute('data-prefix')||'',suf=el.getAttribute('data-suffix')||'';\n    var prm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    if(prm){el.textContent=pre+t.toFixed(dec)+suf;return;}\n    var dur=1300,st=performance.now();\n    function tick(now){var p=Math.min(1,(now-st)/dur);p=1-Math.pow(1-p,3);el.textContent=pre+(t*p).toFixed(dec)+suf;if(p<1)requestAnimationFrame(tick);}\n    requestAnimationFrame(tick);\n  }\n  renderVals(){\n    const v = this.state.view;\n    const seg = (active) => active\n      ? 'border:none;cursor:pointer;font:inherit;font-size:12px;font-weight:700;color:#0F1A30;background:#fff;padding:5px 13px;border-radius:999px'\n      : 'border:none;cursor:pointer;font:inherit;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);background:none;padding:5px 13px;border-radius:999px';\n    return {\n      isHome: v==='home', isReport: v==='report',\n      homeBtn: seg(v==='home'), reportBtn: seg(v==='report'),\n      showHome: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.setState({view:'home'}); window.scrollTo(0,0); },\n      showReport: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.setState({view:'report'}); window.scrollTo(0,0); setTimeout(()=>this.initFx(),90); },\n      noop: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); },\n      research: [\n        { tag:'Housing', title:'Who Owns the Block? Corporate Landlords in Cook County', desc:'Mapping the consolidation of single-family rentals and what it costs tenants.', date:'May 2026', bg:'linear-gradient(150deg,#16243F,#3C465C)' },\n        { tag:'Labor', title:'The Real Wage Floor: Tipped Work in Illinois', desc:'What ending the subminimum wage would mean for 200,000 workers.', date:'April 2026', bg:'linear-gradient(150deg,#5C667A,#2C3346)' },\n        { tag:'Taxation', title:'The Chicago SMART Tax', desc:'Recouping Big Tech tax avoidance to fund non-police crisis response.', date:'March 2026', bg:'linear-gradient(150deg,#9E2B25,#7C231F)' },\n      ],\n      press: [\n        { quote:'The most rigorous case yet for taxing the platforms that profit from our attention.', source:'— Crain’s Chicago Business' },\n        { quote:'IPG gave the council the numbers it needed to act with confidence.', source:'— Ald. district office, City Council' },\n        { quote:'Research that actually speaks to the people it’s about.', source:'— SEIU Local 73' },\n      ],\n      social: [\n        { cap:'How the SMART Tax actually works — in 60 seconds', bg:'linear-gradient(150deg,#16243F,#3C465C)' },\n        { cap:'What $31M could fund across the South Side', bg:'linear-gradient(150deg,#9E2B25,#7C231F)' },\n        { cap:'“Pay what the corner store pays.” — our director', bg:'linear-gradient(150deg,#B0883C,#7A5C22)' },\n        { cap:'Tenants vs. corporate landlords, explained', bg:'linear-gradient(150deg,#2C3346,#5C667A)' },\n      ],\n      stats: [\n        { num:'$144B', val:144, prefix:'$', suffix:'B', dec:0, label:'in federal taxes avoided by the “Silicon Six,” 2015–2024', color:'#E8A0A0' },\n        { num:'18.8%', val:18.8, prefix:'', suffix:'%', dec:1, label:'their effective global tax rate, vs. 29.7% statutory', color:'#C9A14F' },\n        { num:'$0.50', val:0.5, prefix:'$', suffix:'', dec:2, label:'per active Chicago consumer, per month', color:'#fff' },\n        { num:'$31M', val:31, prefix:'$', suffix:'M', dec:0, label:'projected annual revenue from the top eight platforms', color:'#9DCfB0' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
