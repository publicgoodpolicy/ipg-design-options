  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ay its share<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.6;color:rgba(247,241,230,.82);margin:0 0 26px;max-width:34em\">The Chicago SMART Tax asks the platforms profiting off our city to pay $0.50 a user — funding mental-health care and crisis response that isn't the police.<\u002Fp>\n          <a href=\"#\" onclick=\"{{ showReport }}\" style=\"font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#1A1614;background:#E0A52E;text-decoration:none;padding:14px 24px;display:inline-block\">Read the report →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RESEARCH GRID -->\n    <section style=\"max-width:1180px;margin:0 auto;padding:64px 28px 50px\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:5px solid #1A1614;padding-bottom:10px;margin-bottom:32px\">\n        <h2 style=\"font-family:'Anton',sans-serif;font-size:32px;text-transform:uppercase;margin:0\">Latest research<\u002Fh2>\n        <a href=\"#\" style=\"font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#C0241C;text-decoration:none\">All reports →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px\">\n        <sc-for list=\"{{ research }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <a href=\"#\" style=\"text-decoration:none;color:inherit;display:flex;flex-direction:column;background:#F7F1E6;border:2px solid #1A1614\">\n            <div style=\"height:150px;background:{{ item.bg }};position:relative;border-bottom:2px solid #1A1614\">\n              <span style=\"position:absolute;top:12px;left:12px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#F7F1E6;background:#1A1614;padding:5px 10px\">{{ item.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:20px;display:flex;flex-direction:column;flex:1\">\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;line-height:1.15;margin:0 0 10px\">{{ item.title }}<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.5;color:#54473F;margin:0 0 16px\">{{ item.desc }}<\u002Fp>\n              <span style=\"margin-top:auto;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#9A8676\">{{ item.date }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- BIG QUOTE / PRESS -->\n    <section style=\"background:#E0A52E;color:#1A1614\">\n      <div style=\"max-width:1000px;margin:0 auto;padding:64px 28px;text-align:center\">\n        <p style=\"font-family:'Anton',sans-serif;font-size:clamp(28px,4vw,46px);line-height:1.05;text-transform:uppercase;margin:0 0 18px\">“They gave the council the numbers it needed to act.”<\u002Fp>\n        <p style=\"font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:0\">SEIU Local 73 · Crain's Chicago · WBEZ<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SOCIAL STRIP -->\n    <section style=\"background:#1A1614;color:#F7F1E6\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:60px 28px\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px\">\n          <h2 style=\"font-family:'Anton',sans-serif;font-size:30px;text-transform:uppercase;margin:0\">Straight from the street<\u002Fh2>\n          <a href=\"#\" style=\"font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#E0A52E;text-decoration:none\">@publicgoodpolicy →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n          <sc-for list=\"{{ social }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative;aspect-ratio:4/5;overflow:hidden;background:{{ s.bg }};border:2px solid #F7F1E6\">\n              <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.62))\"><\u002Fdiv>\n              <div style=\"position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;background:#E0A52E;display:flex;align-items:center;justify-content:center\"><span style=\"border-left:9px solid #1A1614;border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px\"><\u002Fspan><\u002Fdiv>\n              <p style=\"position:absolute;left:13px;right:13px;bottom:13px;font-weight:700;font-size:13.5px;line-height:1.25;margin:0\">{{ s.cap }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER CTA -->\n    <section style=\"background:#C0241C;color:#F7F1E6\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:60px 28px;text-align:center\">\n        <h2 style=\"font-family:'Anton',sans-serif;font-size:clamp(34px,5vw,60px);text-transform:uppercase;line-height:.95;margin:0 0 14px\">Don't sit it out.<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.55;color:rgba(247,241,230,.88);margin:0 auto 26px;max-width:38em\">Get the research that's changing the rules — and the ways you can plug in — once a month, no jargon.<\u002Fp>\n        <form style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap\" onsubmit=\"{{ noop }}\">\n          <input type=\"email\" placeholder=\"you@email.org\" style=\"border:2px solid #F7F1E6;background:rgba(0,0,0,.12);color:#fff;padding:14px 16px;font-size:15px;font-family:inherit;width:min(320px,70vw)\">\n          <button style=\"font-size:15px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#C0241C;background:#F7F1E6;border:none;padding:14px 24px;cursor:pointer\">Sign me up<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ REPORT ============ -->\n  <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n    <!-- ARTICLE HEADER -->\n    <article>\n      <header style=\"background:#1A1614;color:#F7F1E6;border-bottom:5px solid #C0241C\">\n        <div style=\"max-width:820px;margin:0 auto;padding:24px 28px 0\">\n          <a href=\"#\" onclick=\"{{ showHome }}\" style=\"font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#E0A52E;text-decoration:none\">← Research<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"max-width:820px;margin:0 auto;padding:24px 28px 48px\">\n          <p style=\"font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#E0A52E;margin:0 0 18px\">Taxation · The fight for fair share<\u002Fp>\n          <h1 style=\"font-family:'Anton',sans-serif;font-size:clamp(46px,8vw,92px);line-height:.88;text-transform:uppercase;margin:0 0 22px\">Make Big Tech pay its share<\u002Fh1>\n          <p style=\"font-size:20px;line-height:1.5;color:rgba(247,241,230,.85);margin:0 0 24px;max-width:36em\">Chicago's SMART Tax asks the platforms profiting off our attention for $0.50 a user — and routes every dollar to mental-health care and non-police crisis response.<\u002Fp>\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:rgba(247,241,230,.7)\">\n            <span style=\"color:#F7F1E6\">Institute for the Public Good<\u002Fspan><span style=\"opacity:.4\">/<\u002Fspan><span>March 24, 2026<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- STAT BAND -->\n      <section style=\"background:#E0A52E;color:#1A1614\">\n        <div style=\"max-width:1040px;margin:0 auto;padding:36px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px\">\n          <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div>\n              <div data-count=\"{{ st.val }}\" data-prefix=\"{{ st.prefix }}\" data-suffix=\"{{ st.suffix }}\" data-dec=\"{{ st.dec }}\" style=\"font-family:'Anton',sans-serif;font-size:46px;line-height:.9\">{{ st.num }}<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:600;line-height:1.4;margin-top:8px\">{{ st.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- BODY -->\n      <div style=\"max-width:680px;margin:0 auto;padding:54px 28px 20px;font-size:18.5px;line-height:1.72;color:#2A211C\">\n        <p style=\"margin:0 0 22px\"><span style=\"font-family:'Anton',sans-serif;font-size:62px;line-height:.7;float:left;color:#C0241C;margin:8px 14px -2px 0\">F<\u002Fspan>or twenty years the “Silicon Six” — Alphabet, Amazon, Apple, Meta, Microsoft, and Netflix — have run up record profits while paying a smaller share of their income in tax than the people who clean their offices.<\u002Fp>\n        <p style=\"margin:0 0 22px\">Chicago's Social Media Amusement and Responsibility Tax says enough. The platforms that profit from our attention should help pay for the public systems that attention strains.<\u002Fp>\n\n        <h2 data-reveal=\"\" style=\"font-family:'Anton',sans-serif;font-size:32px;text-transform:uppercase;line-height:1;color:#1A1614;margin:40px 0 14px\">How it works<\u002Fh2>\n        <p style=\"margin:0 0 22px\">The tax is simple: $0.50 per active Chicago user, per month. For the biggest platforms that scales to tens of millions — money earmarked, by ordinance, for community mental-health centers and a non-police crisis-response corps.<\u002Fp>\n\n        <blockquote data-reveal=\"\" style=\"margin:36px 0;background:#1A1614;color:#F7F1E6;padding:32px 30px\">\n          <p style=\"font-family:'Anton',sans-serif;font-size:30px;line-height:1.05;text-transform:uppercase;margin:0;color:#E0A52E\">“Pay what every corner store on the block already pays — your fair share.”<\u002Fp>\n        <\u002Fblockquote>\n\n        <p style=\"margin:0 0 22px\">They say they'll pass the cost to us. The numbers say otherwise: at fifty cents a user, the bill is a rounding error against their margins — and the ordinance bars pass-through on Chicago accounts.<\u002Fp>\n\n        <h2 data-reveal=\"\" style=\"font-family:'Anton',sans-serif;font-size:32px;text-transform:uppercase;line-height:1;color:#1A1614;margin:40px 0 14px\">A template for every city<\u002Fh2>\n        <p style=\"margin:0 0 22px\">The SMART Tax reframes the feed as a taxable amusement, and sends the proceeds straight back to the neighborhoods that generate them. Other cities are already taking notes.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- SOURCES -->\n      <div style=\"max-width:680px;margin:0 auto;padding:24px 28px 70px\">\n        <div data-reveal=\"\" style=\"border-top:3px solid #1A1614;padding-top:18px\">\n          <p style=\"font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#C0241C;margin:0 0 12px\">Sources<\u002Fp>\n          <ol style=\"margin:0;padding-left:20px;font-size:14px;line-height:1.7;color:#54473F\">\n            <li>Fair Tax Foundation, <em>Silicon Six Report 2025<\u002Fem>.<\u002Fli>\n            <li>City of Chicago, <em>SMART Tax Ordinance<\u002Fem>, 2026.<\u002Fli>\n            <li>Illinois Economic Policy Institute, fiscal modeling, 2026.<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- SITE FOOTER -->\n  <footer style=\"background:#1A1614;color:rgba(247,241,230,.7)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:46px 28px;display:flex;gap:36px;flex-wrap:wrap;align-items:center\">\n      <div style=\"display:flex;align-items:center;gap:12px;color:#F7F1E6\">\n        <svg viewBox=\"0 0 100 100\" width=\"34\" height=\"34\" fill=\"currentColor\" aria-hidden=\"true\"><g stroke=\"currentColor\" stroke-width=\"3.4\" stroke-linecap=\"round\"><line x1=\"50\" y1=\"50\" x2=\"50\" y2=\"15\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"78\" y2=\"27\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"85\" y2=\"57\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"69\" y2=\"83\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"29\" y2=\"85\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"15\" y2=\"58\"><\u002Fline><line x1=\"50\" y1=\"50\" x2=\"22\" y2=\"26\"><\u002Fline><\u002Fg><circle cx=\"50\" cy=\"50\" r=\"6\"><\u002Fcircle><circle cx=\"50\" cy=\"12\" r=\"5\"><\u002Fcircle><circle cx=\"80\" cy=\"24\" r=\"4\"><\u002Fcircle><circle cx=\"87\" cy=\"57\" r=\"6.5\"><\u002Fcircle><circle cx=\"69\" cy=\"85\" r=\"5.5\"><\u002Fcircle><circle cx=\"27\" cy=\"87\" r=\"4\"><\u002Fcircle><circle cx=\"12\" cy=\"58\" r=\"6\"><\u002Fcircle><\u002Fsvg>\n        <span style=\"font-family:'Anton',sans-serif;font-size:17px;text-transform:uppercase;line-height:.95\">Institute for the<br>Public Good<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0;font-size:13px;max-width:28em;line-height:1.6\">Independent research for an economy that works for working people. Chicago, Illinois.<\u002Fp>\n      <div style=\"margin-left:auto;display:flex;gap:20px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase\">\n        <a href=\"#\" style=\"color:rgba(247,241,230,.7);text-decoration:none\">Research<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(247,241,230,.7);text-decoration:none\">Newsroom<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(247,241,230,.7);text-decoration:none\">Donate<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(247,241,230,.7);text-decoration:none\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'home' };\n  componentDidMount(){ this.fxAccent='#C0241C'; try{ if(location.hash==='#report'){ this.setState({view:'report'}); setTimeout(()=>this.initFx(),90); } }catch(e){} }\n  componentDidUpdate(pp,ps){ if(this.state.view==='report' && ps.view!=='report') this.initFx(); }\n  initFx(){\n    var accent=this.fxAccent||'#111';\n    var prm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    var bar=document.getElementById('__sfxbar');\n    if(!bar){bar=document.createElement('div');bar.id='__sfxbar';bar.style.cssText='position:fixed;top:0;left:0;height:3px;width:0;z-index:300;transition:width .12s linear';document.body.appendChild(bar);}\n    bar.style.background=accent;\n    if(!this._sfxScroll){this._sfxScroll=function(){var h=document.documentElement.scrollHeight-window.innerHeight;bar.style.width=(h>0?Math.min(1,window.scrollY/h)*100:0)+'%';};window.addEventListener('scroll',this._sfxScroll,{passive:true});}\n    this._sfxScroll();\n    var self=this;\n    setTimeout(function(){\n      var els=[].slice.call(document.querySelectorAll('[data-reveal]'));\n      els.forEach(function(el){if(el.__sfx)return;el.__sfx=1;if(prm)return;el.style.opacity='0';el.style.transform='translateY(24px)';el.style.transition='opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)';var d=parseFloat(el.getAttribute('data-reveal'));if(!isNaN(d))el.style.transitionDelay=d+'ms';});\n      if(!prm){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='none';io.unobserve(e.target);}});},{threshold:.15,rootMargin:'0px 0px -7% 0px'});els.forEach(function(el){io.observe(el);});}\n      var nums=[].slice.call(document.querySelectorAll('[data-count]'));\n      var cio=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){self.countUp(e.target);cio.unobserve(e.target);}});},{threshold:.6});\n      nums.forEach(function(n){if(!n.__cnt){n.__cnt=1;cio.observe(n);}});\n    },60);\n  }\n  countUp(el){\n    var t=parseFloat(el.getAttribute('data-count'));if(isNaN(t)){return;}\n    var dec=parseInt(el.getAttribute('data-dec')||'0',10),pre=el.getAttribute('data-prefix')||'',suf=el.getAttribute('data-suffix')||'';\n    var prm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    if(prm){el.textContent=pre+t.toFixed(dec)+suf;return;}\n    var dur=1300,st=performance.now();\n    function tick(now){var p=Math.min(1,(now-st)/dur);p=1-Math.pow(1-p,3);el.textContent=pre+(t*p).toFixed(dec)+suf;if(p<1)requestAnimationFrame(tick);}\n    requestAnimationFrame(tick);\n  }\n  renderVals(){\n    const v = this.state.view;\n    const seg = (active) => active\n      ? 'border:none;cursor:pointer;font:inherit;font-size:12px;font-weight:800;color:#1A1614;background:#E0A52E;padding:5px 13px;border-radius:3px'\n      : 'border:none;cursor:pointer;font:inherit;font-size:12px;font-weight:700;color:rgba(255,255,255,.8);background:none;padding:5px 13px;border-radius:3px';\n    return {\n      isHome: v==='home', isReport: v==='report',\n      homeBtn: seg(v==='home'), reportBtn: seg(v==='report'),\n      showHome: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.setState({view:'home'}); window.scrollTo(0,0); },\n      showReport: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.setState({view:'report'}); window.scrollTo(0,0); setTimeout(()=>this.initFx(),90); },\n      noop: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); },\n      research: [\n        { tag:'Housing', title:'Who Owns the Block?', desc:'How corporate landlords took over Cook County rentals — and what it costs tenants.', date:'May 2026', bg:'linear-gradient(150deg,#C0241C,#1A1614)' },\n        { tag:'Labor', title:'The Real Wage Floor', desc:'What ending the subminimum tipped wage means for 200,000 Illinois workers.', date:'April 2026', bg:'linear-gradient(150deg,#E0A52E,#1A1614)' },\n        { tag:'Taxation', title:'The Chicago SMART Tax', desc:'Clawing back Big Tech tax avoidance to fund non-police crisis response.', date:'March 2026', bg:'linear-gradient(150deg,#1A1614,#54473F)' },\n      ],\n      social: [\n        { cap:'How the SMA
